<div class="login-container">

  <img
    src="assets/pharmastock-logo-transparent-light.png"
    class="login-logo logo-light"
    alt="PharmaStock Logo" />

  <img
    src="assets/pharmastock-logo-transparent-dark.png"
    class="login-logo logo-dark"
    alt="PharmaStock Logo" />

  <form class="login-card" (ngSubmit)="onSubmit()">

    <h2>Login</h2>

    <input
      id="email"
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
      name="email" 
    />

    <input
      id="password"
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
      name="password" 
    />

    <button
      id="login-btn"
      type="submit"
      class="primary-button"
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Logging in...' : 'Login' }} 

    </button>

    <p *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </p>

  </form>
    
</div>
