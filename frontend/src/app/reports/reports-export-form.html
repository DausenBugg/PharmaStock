<div class="modal-box">

  <h2 class="modal-title">
    Export Report
  </h2>

  <div class="modal-content">

    <p class="modal-text">
      Select a date range for the export.
    </p>

    <div class="export-form">

      <label class="modal-text">
        Start Date

        <input
          class="app-input"
          type="date"
          [(ngModel)]="startDate"
        />
      </label>

      <label class="modal-text">
        End Date

        <input
          class="app-input"
          type="date"
          [(ngModel)]="endDate"
        />
      </label>

    </div>

    <p *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </p>

  </div>

  <div class="modal-actions">

    <button
      type="button"
      class="modal-btn"
      (click)="close()"
    >
      Cancel
    </button>

    <button
      type="button"
      class="modal-btn"
      (click)="exportCsv()"
    >
      Export CSV
    </button>

  </div>

</div>
