<mat-sidenav-container class="dashboard-container">

  <!-- ================= SIDEBAR ================= -->
  <mat-sidenav mode="side" opened class="sidebar">

    <div class="nav-user-block">

      <!-- LOGO -->
      <a routerLink="/dashboard" class="logo-link">
        <div class="sidebar-logo">
          <img
            src="assets/pharmastock-logo-transparent-dark.png"
            class="sidebar-logo-img logo-light"
            alt="PharmaStock Logo"
          />

          <img
            src="assets/pharmastock-logo-transparent-nav.png"
            class="sidebar-logo-img logo-dark"
            alt="PharmaStock Logo"
          />
        </div>
      </a>

      <!-- USER BLOCK -->
      <div class="user-welcome">

        <!-- Avatar (with fallback) -->
        <img
          [src]="profileImageUrl || 'assets/avatar-place-holder.png'"
          (error)="profileImageUrl = null"
          class="profile-avatar"
          alt="User"
        />

        <!-- Welcome text -->
        <div class="welcome-text">
          Welcome {{ profile?.userName || 'User' }}!
        </div>

      </div>

    </div>

    <!-- NAVIGATION -->
    <mat-nav-list>

      <a mat-list-item
         routerLink="/dashboard"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-item">
        Dashboard
      </a>

      <a mat-list-item
         routerLink="/inventory"
         routerLinkActive="active"
         class="nav-item">
        Inventory
      </a>

      <a mat-list-item
         routerLink="/orders"
         routerLinkActive="active"
         class="nav-item">
        Orders
      </a>

      <a mat-list-item
         routerLink="/reports"
         routerLinkActive="active"
         class="nav-item">
        Reports
      </a>

      <a mat-list-item
         routerLink="/settings"
         routerLinkActive="active"
         class="nav-item">
        Settings
      </a>

      <a mat-list-item
         routerLink="/administration"
         routerLinkActive="active"
         class="nav-item">
        Administration
      </a>

      <a mat-list-item
         (click)="logout()"
         class="nav-item logout-link">
        Sign Out
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <!-- ================= MAIN CONTENT ================= -->
  <mat-sidenav-content>
    <ng-content></ng-content>
  </mat-sidenav-content>

</mat-sidenav-container>
