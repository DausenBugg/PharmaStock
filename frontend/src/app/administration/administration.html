<mat-sidenav-container class="administration-container">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" opened class="sidebar">

    <a routerLink="/dashboard" class="logo-link">
      <div class="sidebar-logo">
        <img src="assets/pharmastock-logo-transparent-dark.png"
             class="sidebar-logo-img logo-light"
             alt="PharmaStock Logo" />

        <img src="assets/pharmastock-logo-transparent-nav.png"
             class="sidebar-logo-img logo-dark"
             alt="PharmaStock Logo" />
      </div>
    </a>
    
    <mat-nav-list>

      <a mat-list-item routerLink="/dashboard"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }"
         class="nav-item">
        Dashboard
      </a>

      <a mat-list-item routerLink="/inventory"
         routerLinkActive="active"
         class="nav-item">
        Inventory
      </a>

      <a mat-list-item routerLink="/orders"
         routerLinkActive="active"
         class="nav-item">
        Orders
      </a>

      <a mat-list-item routerLink="/reports"
         routerLinkActive="active"
         class="nav-item">
        Reports
      </a>

      <a mat-list-item routerLink="/settings"
         routerLinkActive="active"
         class="nav-item">
        Settings
      </a>

      <a mat-list-item routerLink="/administration"
         routerLinkActive="active"
         class="nav-item">
        Administration
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <!-- MAIN AREA -->
  <mat-sidenav-content>

    <!-- HEADER -->
    <mat-toolbar class="administration-header">
      <div class="header-container">
        <div class="pharmacy-title">Pharmacy Name</div>
        <div class="administration-subtitle">Administration</div>
      </div>
    </mat-toolbar>

    <div class="content">

      <!-- EMPLOYEE TABLE -->
      <table mat-table
             [dataSource]="dataSource"
             class="administration-table mat-elevation-z2">

        <!-- NAME -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let emp">
            <input
              class="app-input"
              [(ngModel)]="emp.name">
          </td>
        </ng-container>

        <!-- EMAIL -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let emp">
            {{ emp.email }}
          </td>
        </ng-container>

        <!-- ROLE -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let emp">
            <input
              class="app-input"
              list="roles"
              [(ngModel)]="emp.role">
          </td>
        </ng-container>

        <!-- SAVE -->
        <ng-container matColumnDef="save">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let emp">
            <button
              class="primary-button administration-btn"
              (click)="confirmUpdate(emp)">
              Save
            </button>
          </td>
        </ng-container>

        <!-- REMOVE -->
        <ng-container matColumnDef="remove">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let emp">
            <button
              class="primary-button administration-btn"
              (click)="confirmRemove(emp)">
              Remove
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>

      <!-- ROLE OPTIONS -->
      <datalist id="roles">
        <option value="User"></option>
        <option value="Manager"></option>
        <option value="Administrator"></option>
      </datalist>


      <!-- ADD EMPLOYEE -->
      <div class="add-user-section">

        <h3>Add Employee</h3>

        <div class="employee-grid">

          <input
            class="app-input"
            placeholder="Name"
            [(ngModel)]="newEmployee.name">

          <input
            class="app-input"
            placeholder="Email"
            [(ngModel)]="newEmployee.email">

          <input
            class="app-input"
            list="roles"
            placeholder="Role"
            [(ngModel)]="newEmployee.role">

          <input
            type="password"
            class="app-input"
            placeholder="Temporary Password"
            [(ngModel)]="tempPassword">

        </div>

        <div class="employee-button-row">

          <button
            class="administration-btn"
            (click)="confirmAdd()">
            Add Employee
          </button>

        </div>

      </div>

    </div>


    <!-- ADMIN CONFIRMATION MODAL -->
    <div class="modal-overlay" *ngIf="showConfirmModal">

      <div class="modal-box">

        <h3 class="modal-title">Administrator Verification Required</h3>

        <p class="modal-text">
          Please enter your administrator password to confirm this action.
        </p>

        <input
          class="app-input"
          type="password"
          placeholder="Administrator Password"
          [(ngModel)]="adminPasswordInput"
          name="adminPasswordInput"
        />

        <div class="modal-actions">

          <button
            class="administration-btn"
            (click)="finalizeAdminAction()">
            Confirm
          </button>

          <button
            class="administration-btn"
            (click)="cancelAdminAction()">
            Cancel
          </button>

        </div>

      </div>

    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
