

  <!-- HEADER -->
  <mat-toolbar class="administration-header">
    <div class="header-container">
      <div class="pharmacy-title">Pharmacy Name</div>
      <div class="administration-subtitle">Administration</div>
    </div>
  </mat-toolbar>

  <div class="content">

    <!-- EMPLOYEE TABLE -->
    <div class="table-header">
    
      <table mat-table
            [dataSource]="dataSource"
            class="administration-table mat-elevation-z2">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let emp">
            <input class="app-input" [(ngModel)]="emp.name">
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let emp">
            {{ emp.email }}
          </td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let emp">
            <select class="app-input" [(ngModel)]="emp.role">
              <option *ngFor="let role of roleOptions" [value]="role">
                {{ role }}
              </option>
            </select>
          </td>
        </ng-container>

        <ng-container matColumnDef="save">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let emp">
            <button class="administration-btn"
                    (click)="confirmUpdate(emp)">
              Save
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="remove">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let emp">
            <button class="administration-btn"
                    (click)="confirmRemove(emp)">
              Remove
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>

    <!-- ADD EMPLOYEE -->
    <div class="add-user-section">

      <h3>Add Employee</h3>

      <div class="employee-grid">

        <input class="app-input" placeholder="Name" [(ngModel)]="newEmployee.name">
        <input class="app-input" placeholder="Email" [(ngModel)]="newEmployee.email">
        <select class="app-input" [(ngModel)]="newEmployee.role">
          <option *ngFor="let role of roleOptions" [value]="role">
            {{ role }}
          </option>
        </select>

        <input type="password"
               class="app-input"
               placeholder="Temporary Password"
               [(ngModel)]="tempPassword">

      </div>

      <div class="employee-button-row">
        <button class="administration-btn" (click)="confirmAdd()">
          Add Employee
        </button>
      </div>

    </div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" *ngIf="showConfirmModal">

    <div class="modal-box">

      <h3 class="modal-title">Administrator Verification Required</h3>

      <p class="modal-text">
        Please enter your administrator password to confirm this action.
      </p>

      <input class="app-input"
             type="password"
             [(ngModel)]="adminPasswordInput">

      <div class="modal-actions">

        <button class="modal-btn" (click)="finalizeAdminAction()">
          Confirm
        </button>

        <button class="modal-btn" (click)="cancelAdminAction()">
          Cancel
        </button>

      </div>

    </div>

  </div>
