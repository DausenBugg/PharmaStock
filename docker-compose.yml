services:
  mysql:
    image: mysql:8.0
    container_name: pharmastock-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pharmastockdb
      MYSQL_USER: dev
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - pharmastock_mysql_data:/var/lib/mysql

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: pharmastock-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pharmastock_mysql_data:
